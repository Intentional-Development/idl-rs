name: v1.0.0 Readiness Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Run tests
        run: cargo test --workspace --all-features
      
      - name: Run round-trip integration tests
        run: cargo test --test round_trip -p idl-proposals -- --test-threads=1

      - name: Run status and drift gate fixture
        run: |
          cargo run -p idl-cli -- emit typescript fixtures/v1-gate/idl.graph.json --out fixtures/v1-gate/generated/typescript
          cargo run -p idl-cli -- emit python fixtures/v1-gate/idl.graph.json --out fixtures/v1-gate/generated/python
          cargo run -p idl-cli -- emit rust fixtures/v1-gate/idl.graph.json --out fixtures/v1-gate/generated/rust
          (cd fixtures/v1-gate && cargo run -p idl-cli --manifest-path ../../Cargo.toml -- status)
          (cd fixtures/v1-gate && cargo run -p idl-cli --manifest-path ../../Cargo.toml -- drift --gate)

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
      
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      
      - name: Check formatting
        run: cargo fmt --check
